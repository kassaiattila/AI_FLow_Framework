# Invoice Automation Pipeline v1
# Chains: email fetch → intent classification → document extraction
# First real use case proving the Pipeline Orchestrator works (C6).
#
# Prerequisites:
#   - Email connector configured (connector_id)
#   - Classifier service running
#   - Document extractor service running
#
# Usage:
#   POST /api/v1/pipelines  (create with this YAML)
#   POST /api/v1/pipelines/{id}/run  {"input_data": {"connector_id": "cfg-1"}}

name: invoice_automation_v1
version: "1.0.0"
description: "Fetch emails → classify intent → extract document data from attachments"

trigger:
  type: manual

input_schema:
  connector_id:
    type: string
    required: true
    description: "Email connector configuration ID"
  days:
    type: integer
    default: 7
    description: "Fetch emails from last N days"
  limit:
    type: integer
    default: 10
    description: "Maximum number of emails to fetch"

steps:
  - name: fetch_emails
    service: email_connector
    method: fetch_emails
    config:
      connector_id: "{{ input.connector_id }}"
      limit: "{{ input.limit }}"
      since_days: "{{ input.days }}"
    retry:
      max_retries: 3
      backoff_base: 2.0
      backoff_max: 30.0
    timeout: 120

  - name: classify_intent
    service: classifier
    method: classify
    depends_on: [fetch_emails]
    for_each: "{{ fetch_emails.output.emails }}"
    config:
      text: "{{ item.subject }} {{ item.body_text }}"
      subject: "{{ item.subject }}"
    retry:
      max_retries: 2
      backoff_base: 1.0
      backoff_max: 10.0
    concurrency: 5
    timeout: 60

  - name: extract_documents
    service: document_extractor
    method: extract
    depends_on: [fetch_emails]
    for_each: "{{ fetch_emails.output.emails }}"
    config:
      file_path: "{{ item.attachments[0].file_path if item.attachments else '' }}"
    retry:
      max_retries: 2
      backoff_base: 1.0
      backoff_max: 10.0
    concurrency: 3
    timeout: 180

metadata:
  author: "AIFlow"
  category: "document_processing"
  tier: "1.5"
  cycle: "C6"
