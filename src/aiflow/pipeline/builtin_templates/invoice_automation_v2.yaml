# Invoice Automation Pipeline v2
# Extends V1 with: file routing (DataRouter) + notification (NotificationService)
# Chain: email fetch → classify → extract → route by rules → notify admin
#
# Prerequisites:
#   - Email connector configured (connector_id)
#   - Classifier, Document Extractor, DataRouter, Notification services running
#   - Notification channel configured (config_name) for email/Slack delivery
#
# Usage:
#   POST /api/v1/pipelines  (create with this YAML)
#   POST /api/v1/pipelines/{id}/run  {"input_data": {"connector_id": "cfg-1"}}

name: invoice_automation_v2
version: "2.0.0"
description: "Fetch emails → classify → extract → route files → notify admin"

trigger:
  type: manual

input_schema:
  connector_id:
    type: string
    required: true
    description: "Email connector configuration ID"
  days:
    type: integer
    default: 7
    description: "Fetch emails from last N days"
  limit:
    type: integer
    default: 10
    description: "Maximum number of emails to fetch"
  notify_channel:
    type: string
    default: "email"
    description: "Notification channel type (email, slack, webhook)"
  notify_recipients:
    type: string
    default: "admin@aiflow.local"
    description: "Comma-separated notification recipients"

steps:
  # --- V1 steps (unchanged) ---

  - name: fetch_emails
    service: email_connector
    method: fetch_emails
    config:
      connector_id: "{{ input.connector_id }}"
      limit: "{{ input.limit }}"
      since_days: "{{ input.days }}"
    retry:
      max_retries: 3
      backoff_base: 2.0
      backoff_max: 30.0
    timeout: 120

  - name: classify_intent
    service: classifier
    method: classify
    depends_on: [fetch_emails]
    for_each: "{{ fetch_emails.output.emails }}"
    config:
      text: "{{ item.subject }} {{ item.body_text }}"
      subject: "{{ item.subject }}"
    retry:
      max_retries: 2
      backoff_base: 1.0
      backoff_max: 10.0
    concurrency: 5
    timeout: 60

  - name: extract_documents
    service: document_extractor
    method: extract
    depends_on: [fetch_emails]
    for_each: "{{ fetch_emails.output.emails }}"
    config:
      file_path: "{{ item.attachments[0].file_path if item.attachments else '' }}"
    retry:
      max_retries: 2
      backoff_base: 1.0
      backoff_max: 10.0
    concurrency: 3
    timeout: 180

  # --- V2 new steps ---

  - name: route_documents
    service: data_router
    method: filter
    depends_on: [extract_documents, classify_intent]
    config:
      items: "{{ extract_documents.output.results }}"
      condition: "confidence > 0.5"
    timeout: 60

  - name: notify_team
    service: notification
    method: send
    depends_on: [route_documents]
    config:
      channel: "{{ input.notify_channel }}"
      template: "Invoice pipeline completed: {{ extract_documents.output.results | length if extract_documents.output.results is defined else 0 }} documents processed, {{ route_documents.output.matched }} passed filter."
      recipients:
        - "{{ input.notify_recipients }}"
      subject: "AIFlow Invoice Pipeline V2 Complete"
    retry:
      max_retries: 2
      backoff_base: 2.0
      backoff_max: 15.0
    timeout: 30

metadata:
  author: "AIFlow"
  category: "document_processing"
  tier: "2"
  cycle: "C9"
