# Vault dev container — Sprint M (v1.4.9) S115 kickoff
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.vault.yml up -d vault
#   curl -s http://localhost:8210/v1/sys/health | jq .
#   export VAULT_ADDR=http://localhost:8210  VAULT_TOKEN=aiflow-dev-root
#
# This is DEV ONLY. Production uses an external Vault cluster with AppRole auth.
# Root token `aiflow-dev-root` is deterministic so local workflows and tests can
# reference it without a bootstrap step.
#
# Host port is 8210 (not the default 8200) because the DOHA stack already binds
# 8200 locally. Override via AIFLOW_VAULT_PORT in your .env if needed.
#
# Storage is ephemeral (in-memory) — restarting the container wipes KVs. That is
# intentional for dev; S116 seeds test fixtures on every test run.

services:
  vault:
    image: hashicorp/vault:1.15
    container_name: aiflow-vault-dev
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: aiflow-dev-root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    ports:
      - "${AIFLOW_VAULT_PORT:-8210}:8200"
    command: ["vault", "server", "-dev", "-dev-root-token-id=aiflow-dev-root"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 5
