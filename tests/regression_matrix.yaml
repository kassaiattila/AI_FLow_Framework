version: 1
rules:
  - pattern: "src/aiflow/core/**"
    suites: FULL
    reason: "Core kernel change affects ALL components"

  - pattern: "src/aiflow/__init__.py"
    suites: [core-unit]
    reason: "Public API exports"

  - pattern: "src/aiflow/state/**"
    suites: [state-unit, core-unit]
    reason: "State layer change affects ORM and repository"

  - pattern: "src/aiflow/models/**"
    suites: [models-unit, core-unit]
    reason: "Model layer change affects protocols, registry, and client"

  - pattern: "src/aiflow/vectorstore/**"
    suites: [vectorstore-unit, models-unit, core-unit]
    reason: "Vector store change affects search, embedder, and model protocols"

  - pattern: "alembic/versions/003_*"
    suites: [models-unit]
    reason: "Model registry migration affects model layer"

  - pattern: "alembic/versions/004_*"
    suites: [vectorstore-unit]
    reason: "Vector store migration affects collections, documents, chunks"

  - pattern: "src/aiflow/engine/**"
    suites: [engine-unit, core-unit, integration-state]
    reason: "Engine changes may affect core and state"

  - pattern: "src/aiflow/agents/**"
    suites: [agents-unit, engine-unit, core-unit]
    reason: "Agent changes may affect orchestration, engine, and core"

  - pattern: "src/aiflow/prompts/**"
    suites: [prompts-unit, core-unit]
    reason: "Prompt platform changes affect schema, manager, sync, and A/B testing"

  - pattern: "src/aiflow/documents/**"
    suites: [documents-unit, vectorstore-unit, core-unit]
    reason: "Document management changes affect registry, versioning, freshness, and vector store"

  - pattern: "src/aiflow/ingestion/**"
    suites: [ingestion-unit, documents-unit, vectorstore-unit, core-unit]
    reason: "Ingestion pipeline changes affect parsers, chunkers, documents, and vector store"

  - pattern: "pyproject.toml"
    suites: FULL
    reason: "Dependency change may affect everything"

default_suites:
  - core-unit
  - state-unit
  - models-unit
  - vectorstore-unit
  - engine-unit
  - agents-unit
  - prompts-unit
  - documents-unit
  - ingestion-unit
