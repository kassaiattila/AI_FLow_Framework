version: 1
rules:
  - pattern: "src/aiflow/core/**"
    suites: FULL
    reason: "Core kernel change affects ALL components"

  - pattern: "src/aiflow/__init__.py"
    suites: [core-unit]
    reason: "Public API exports"

  - pattern: "src/aiflow/state/**"
    suites: [state-unit, core-unit]
    reason: "State layer change affects ORM and repository"

  - pattern: "src/aiflow/models/**"
    suites: [models-unit, core-unit]
    reason: "Model layer change affects protocols, registry, and client"

  - pattern: "src/aiflow/vectorstore/**"
    suites: [vectorstore-unit, models-unit, core-unit]
    reason: "Vector store change affects search, embedder, and model protocols"

  - pattern: "alembic/versions/003_*"
    suites: [models-unit]
    reason: "Model registry migration affects model layer"

  - pattern: "alembic/versions/004_*"
    suites: [vectorstore-unit]
    reason: "Vector store migration affects collections, documents, chunks"

  - pattern: "src/aiflow/engine/**"
    suites: [engine-unit, core-unit, integration-state]
    reason: "Engine changes may affect core and state"

  - pattern: "src/aiflow/skill_system/**"
    suites: [skills-unit, engine-unit, core-unit]
    reason: "Skill system changes may affect engine and core"

  - pattern: "src/aiflow/tools/**"
    suites: [skills-unit, core-unit]
    reason: "Tools changes may affect skills and core"

  - pattern: "src/aiflow/prompts/**"
    suites: [prompts-unit, core-unit]
    reason: "Prompt platform changes affect schema, manager, sync, and A/B testing"

  - pattern: "src/aiflow/documents/**"
    suites: [documents-unit, vectorstore-unit, core-unit]
    reason: "Document management changes affect registry, versioning, freshness, and vector store"

  - pattern: "src/aiflow/ingestion/**"
    suites: [ingestion-unit, documents-unit, vectorstore-unit, core-unit]
    reason: "Ingestion pipeline changes affect parsers, chunkers, documents, and vector store"

  - pattern: "src/aiflow/skills/**"
    suites: [skills-unit, core-unit]
    reason: "Skill system changes affect manifest, loader, registry, and core"

  - pattern: "src/aiflow/evaluation/**"
    suites: [evaluation-unit, core-unit]
    reason: "Evaluation framework changes affect scorers, datasets, and core"

  - pattern: "src/aiflow/execution/**"
    suites: [execution-unit, core-unit]
    reason: "Execution layer changes affect queue, worker, DLQ, and rate limiter"

  - pattern: "src/aiflow/security/**"
    suites: [security-unit, core-unit]
    reason: "Security layer changes affect auth, RBAC, and guardrails"

  - pattern: "src/aiflow/api/**"
    suites: [api-unit, security-unit, core-unit]
    reason: "API layer changes affect endpoints, auth middleware, and core"

  - pattern: "src/aiflow/cli/**"
    suites: [cli-unit, core-unit]
    reason: "CLI changes affect command groups, subcommands, and core wiring"

  - pattern: "src/aiflow/observability/**"
    suites: [core-unit]
    reason: "Observability changes affect tracing, cost tracking, SLA monitoring, and metrics"

  - pattern: "alembic/versions/005_*"
    suites: [security-unit]
    reason: "Security migration affects teams, users, and audit tables"

  - pattern: "src/aiflow/contrib/**"
    suites: [core-unit]
    reason: "Contrib module changes affect messaging, connectors, and core integration"

  - pattern: "src/aiflow/pipeline/**"
    suites: [pipeline-unit, core-unit]
    reason: "Pipeline orchestrator changes affect adapters, compiler, runner, templates"

  - pattern: "aiflow-admin/**"
    suites: [e2e-ui]
    reason: "Admin dashboard changes require E2E Playwright re-test"

  - pattern: ".github/workflows/**"
    suites: []
    reason: "CI/CD workflow changes — no test suite, validated by YAML lint"

  - pattern: "k8s/**"
    suites: FULL
    reason: "Kubernetes manifests change may affect deployment and all services"

  - pattern: "pyproject.toml"
    suites: FULL
    reason: "Dependency change may affect everything"

default_suites:
  - core-unit
  - state-unit
  - models-unit
  - vectorstore-unit
  - engine-unit
  - prompts-unit
  - documents-unit
  - ingestion-unit
  - skills-unit
  - evaluation-unit
  - execution-unit
  - security-unit
  - api-unit
  - cli-unit
