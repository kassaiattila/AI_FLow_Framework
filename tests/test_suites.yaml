version: 1
suites:
  core-unit:
    description: "Core kernel unit tests"
    path: "tests/unit/core/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: critical
    max_duration_seconds: 30
    coverage_target: 90.0
    requires_services: []
    components:
      - core.config
      - core.types
      - core.errors
      - core.context
      - core.events
      - core.registry
      - core.di
      - observability.tracing
      - observability.cost_tracker
      - observability.sla_monitor
      - observability.metrics

  state-unit:
    description: "State layer unit tests (ORM models, repository)"
    path: "tests/unit/state/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: high
    max_duration_seconds: 30
    coverage_target: 85.0
    requires_services: []
    components:
      - state.models
      - state.repository

  models-unit:
    description: "Model abstraction layer unit tests (metadata, protocols, registry, client, router, cost)"
    path: "tests/unit/models/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: critical
    max_duration_seconds: 30
    coverage_target: 90.0
    requires_services: []
    components:
      - models.metadata
      - models.protocols
      - models.protocols.classification
      - models.protocols.extraction
      - models.registry
      - models.client
      - models.router
      - models.cost

  vectorstore-unit:
    description: "Vector store unit tests (base models, hybrid search, embedder)"
    path: "tests/unit/vectorstore/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: high
    max_duration_seconds: 30
    coverage_target: 85.0
    requires_services: []
    components:
      - vectorstore.base
      - vectorstore.search
      - vectorstore.embedder

  engine-unit:
    description: "Workflow engine unit tests"
    path: "tests/unit/engine/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: critical
    max_duration_seconds: 60
    coverage_target: 90.0
    requires_services: []
    components:
      - engine.step
      - engine.dag
      - engine.conditions
      - engine.policies
      - engine.workflow
      - engine.runner
      - engine.checkpoint
      - engine.serialization

  prompts-unit:
    description: "Prompt platform unit tests (schema, manager, sync, A/B testing)"
    path: "tests/unit/prompts/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: high
    max_duration_seconds: 30
    coverage_target: 90.0
    requires_services: []
    components:
      - prompts.schema
      - prompts.manager
      - prompts.sync
      - prompts.ab_testing

  documents-unit:
    description: "Document management unit tests (registry, versioning, freshness)"
    path: "tests/unit/documents/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: high
    max_duration_seconds: 30
    coverage_target: 85.0
    requires_services: []
    components:
      - documents.registry
      - documents.versioning
      - documents.freshness

  ingestion-unit:
    description: "Ingestion pipeline unit tests (parsers, chunkers, pipeline)"
    path: "tests/unit/ingestion/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: high
    max_duration_seconds: 30
    coverage_target: 85.0
    requires_services: []
    components:
      - ingestion.chunkers
      - ingestion.pipeline

  skills-unit:
    description: "Skill system unit tests (manifest, loader, registry)"
    path: "tests/unit/skills/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: critical
    max_duration_seconds: 30
    coverage_target: 90.0
    requires_services: []
    components:
      - skills.manifest
      - skills.loader
      - skills.registry

  evaluation-unit:
    description: "Evaluation framework unit tests (framework, scorers, datasets)"
    path: "tests/unit/evaluation/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: high
    max_duration_seconds: 30
    coverage_target: 90.0
    requires_services: []
    components:
      - evaluation.framework
      - evaluation.scorers
      - evaluation.datasets

  execution-unit:
    description: "Execution layer unit tests (queue, worker, DLQ, rate limiter, scheduler)"
    path: "tests/unit/execution/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: critical
    max_duration_seconds: 30
    coverage_target: 90.0
    requires_services: []
    components:
      - execution.queue
      - execution.worker
      - execution.dlq
      - execution.rate_limiter
      - execution.scheduler

  security-unit:
    description: "Security layer unit tests (auth, RBAC, guardrails, audit, secrets)"
    path: "tests/unit/security/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: critical
    max_duration_seconds: 30
    coverage_target: 90.0
    requires_services: []
    components:
      - security.auth
      - security.rbac
      - security.guardrails
      - security.audit
      - security.secrets

  api-unit:
    description: "API layer unit tests (app factory, health, workflows)"
    path: "tests/unit/api/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: critical
    max_duration_seconds: 30
    coverage_target: 90.0
    requires_services: []
    components:
      - api.app
      - api.health

  cli-unit:
    description: "CLI unit tests (main app, command groups, subcommands)"
    path: "tests/unit/cli/"
    suite_type: unit
    run_on: [commit, pr, merge]
    priority: high
    max_duration_seconds: 30
    coverage_target: 85.0
    requires_services: []
    components:
      - cli.main
      - cli.commands

  phase-1a-e2e:
    description: "AIFlow v2 Phase 1a acceptance + backward compat regression E2E"
    path: "tests/e2e/v1_4_0_phase_1a/"
    suite_type: e2e
    run_on: [pr, merge]
    priority: critical
    max_duration_seconds: 10
    coverage_target: 0.0
    requires_services: []
    components:
      - intake.package
      - intake.repository
      - policy.engine
      - providers.registry
      - skills.instance
      - pipeline.compatibility
      - services.document_extractor.shim

  ci-cross-uc:
    description: "Sprint L v1.4.8 CI gate — 4 UC smoke (Invoice + RAG + Email + Monitoring/Costs) <10 min"
    suite_type: integration
    run_on: [pr, merge]
    priority: critical
    max_duration_seconds: 600
    coverage_target: 0.0
    requires_services: [postgresql, redis]
    paths:
      - tests/unit/pipeline/test_invoice_finder_v3.py
      - tests/unit/pipeline/test_invoice_v2_template.py
      - tests/unit/pipeline/test_invoice_classifier.py
      - tests/integration/services/rag_engine/test_ingest_uc2.py
      - tests/integration/services/email_connector/test_scan_and_classify.py
      - tests/integration/services/email_connector/test_intent_routing.py
      - tests/integration/test_cost_cap_enforcement.py
      - tests/integration/api/test_runs_trace.py
    components:
      - skills.invoice_finder
      - skills.aszf_rag_chat
      - skills.email_intent_processor
      - services.rag_engine
      - services.email_connector
      - policy.cost_cap
      - policy.intent_rules
      - observability.trace
      - observability.span_metrics
