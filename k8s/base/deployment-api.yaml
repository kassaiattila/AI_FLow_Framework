apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiflow-api
  namespace: aiflow
  labels:
    app.kubernetes.io/name: aiflow-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: aiflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aiflow-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiflow-api
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/bestixcom/aiflow-api:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aiflow-config
            - secretRef:
                name: aiflow-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: aiflow-api
  namespace: aiflow
  labels:
    app.kubernetes.io/name: aiflow-api
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiflow-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
