apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiflow-worker
  namespace: aiflow
  labels:
    app.kubernetes.io/name: aiflow-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: aiflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aiflow-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiflow-worker
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/bestixcom/aiflow-worker:latest
          command: ["python", "-m", "aiflow.execution.worker"]
          envFrom:
            - configMapRef:
                name: aiflow-config
            - secretRef:
                name: aiflow-secrets
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      restartPolicy: Always
---
