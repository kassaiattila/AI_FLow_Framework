name: aszf_rag_chain_expert
version: "0.1.0"
description: |
  Sprint U / S155 — UC2 RAG retrieval + answer chain for the EXPERT persona.
  Mirrors the baseline 4-step DAG but pins `system_<role>` to
  `aszf-rag/system_prompt_expert`. Default-off — only resolved by
  `_resolve_workflow_for_persona("expert")` when the PromptWorkflow shim is
  on and `aszf_rag_chat` is in `AIFLOW_PROMPT_WORKFLOWS__SKILLS_CSV`. Flag-off
  keeps the legacy direct-prompt path byte-stable for the expert persona.

default_label: prod
tags:
  - uc2
  - rag
  - aszf
  - persona-expert
  - sprint-u-s155

steps:
  - id: rewrite_query
    prompt_name: aszf-rag/query_rewriter
    description: Reformulate the user query for vector search.
    output_key: rewritten_query

  - id: system_expert
    prompt_name: aszf-rag/system_prompt_expert
    description: Expert persona system message (precise, regulatory-grade tone).
    depends_on: [rewrite_query]
    output_key: system_prompt

  - id: answer
    prompt_name: aszf-rag/answer_generator
    description: Generate the user-facing answer with retrieved citations.
    depends_on: [system_expert]
    output_key: answer

  - id: extract_citations
    prompt_name: aszf-rag/citation_extractor
    description: Extract verifiable citations from the generated answer.
    required: false
    depends_on: [answer]
    output_key: citations
