name: Deploy to Staging

on:
  push:
    tags:
      - "v*-rc*"          # e.g. v1.2.0-rc1
      - "v*-staging*"     # e.g. v1.2.0-staging

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/bestixcom/aiflow-api
  IMAGE_WORKER: ghcr.io/bestixcom/aiflow-worker
  K8S_NAMESPACE: aiflow-staging

permissions:
  contents: read
  packages: write

jobs:
  # ------------------------------------------------------------------
  # Build & push container images
  # ------------------------------------------------------------------
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_API }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: worker
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_WORKER }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

  # ------------------------------------------------------------------
  # Deploy to staging cluster
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          TAG="${{ needs.build.outputs.image_tag }}"

          # Apply base resources
          kubectl apply -f k8s/base/namespace.yaml

          # Update image tags and apply deployments
          sed "s|:latest|:${TAG}|g" k8s/base/deployment-api.yaml \
            | kubectl apply -f -
          sed "s|:latest|:${TAG}|g" k8s/base/deployment-worker.yaml \
            | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status \
            deployment/aiflow-api --timeout=300s
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status \
            deployment/aiflow-worker --timeout=300s

      - name: Run smoke tests
        run: |
          API_URL=$(kubectl -n ${{ env.K8S_NAMESPACE }} get svc aiflow-api \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "API endpoint: ${API_URL:-cluster-internal}"
          # Placeholder: add real smoke test commands here
          echo "Smoke tests passed (placeholder)"
