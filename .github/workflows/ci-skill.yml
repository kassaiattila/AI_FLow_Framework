name: Skill CI

on:
  pull_request:
    paths: ['skills/**']

jobs:
  test-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv venv && uv pip install -e ".[dev]"
      - run: .venv/bin/pytest skills/ -v --tb=short
