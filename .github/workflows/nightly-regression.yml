name: Nightly Regression (L3)

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily (after nightly-eval at 02:00)
    - cron: "0 7 * * 1"  # 07:00 UTC Monday — weekly UC3 4-combo matrix
    - cron: "0 8 * * 1"  # 08:00 UTC Monday — Sprint V SV-5 weekly DocRecognizer per-doctype matrix
  workflow_dispatch:  # Manual trigger

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          .venv/bin/pytest tests/unit/ -v \
            --cov=aiflow --cov-report=xml --cov-report=term-missing \
            --junitxml=test-results-unit.xml
        env:
          AIFLOW_DATABASE_URL: "postgresql://localhost/test"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            test-results-unit.xml
            coverage.xml
          retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aiflow_test
          POSTGRES_USER: aiflow
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aiflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        python-version: "3.12"

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run migrations
        run: .venv/bin/alembic upgrade head
        env:
          AIFLOW_DATABASE__URL: postgresql+asyncpg://aiflow:test@localhost:5432/aiflow_test

      # Sprint S / S145 (SS-SKIP-1): cache BAAI/bge-m3 weights so the
      # 1024-dim integration tests un-skip. Cache key is content-hashed
      # against the bootstrap script — bumping the script forces a refetch.
      - name: Cache BGE-M3 weights
        id: bge-m3-cache
        uses: actions/cache@v4
        with:
          path: .cache/models/bge-m3
          key: bge-m3-${{ runner.os }}-${{ hashFiles('scripts/bootstrap_bge_m3.py') }}

      - name: Bootstrap BGE-M3 weights (on cache miss)
        if: steps.bge-m3-cache.outputs.cache-hit != 'true'
        run: .venv/bin/python scripts/bootstrap_bge_m3.py --cache-dir .cache/models/bge-m3

      - name: Run integration tests
        run: |
          .venv/bin/pytest tests/integration/ -v \
            --junitxml=test-results-integration.xml
        env:
          AIFLOW_DATABASE__URL: postgresql+asyncpg://aiflow:test@localhost:5432/aiflow_test
          AIFLOW_REDIS__URL: redis://localhost:6379/1
          AIFLOW_BGE_M3__CACHE_FOLDER: .cache/models/bge-m3

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results-integration.xml
          retention-days: 30

  e2e-tests:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aiflow_test
          POSTGRES_USER: aiflow
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aiflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: .venv/bin/playwright install --with-deps chromium

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: aiflow-admin/package-lock.json

      - name: Build frontend
        run: cd aiflow-admin && npm ci && npm run build

      - name: Run migrations
        run: uv run alembic upgrade head
        env:
          AIFLOW_DATABASE__URL: postgresql+asyncpg://aiflow:test@localhost:5432/aiflow_test

      - name: Start API server
        run: |
          .venv/bin/python -B -m uvicorn aiflow.api.app:create_app --factory --port 8102 &
          sleep 5
          curl -sf http://localhost:8102/health || exit 1
        env:
          AIFLOW_DATABASE__URL: postgresql+asyncpg://aiflow:test@localhost:5432/aiflow_test
          AIFLOW_REDIS__URL: redis://localhost:6379/1

      - name: Serve frontend
        run: |
          npx serve aiflow-admin/dist -l 5174 -s &
          sleep 2

      - name: Run E2E tests
        run: |
          .venv/bin/pytest tests/e2e/ -v \
            --junitxml=test-results-e2e.xml
        env:
          BASE_URL: http://localhost:5174

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results-e2e.xml
          retention-days: 30

  admin-build:
    name: Admin Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: aiflow-admin/package-lock.json

      - name: Install and build
        run: cd aiflow-admin && npm ci && npx tsc --noEmit && npm run build

  # Sprint U S153 SP-FU-2 — Weekly UC3 4-combo measurement matrix.
  # Runs `scripts/measure_uc3_llm_context.py` on the 25-fixture corpus across
  # the 4 (strategy × LLM-context) combinations. Skip-by-default on forks
  # (needs `secrets.OPENAI_API_KEY`). Triggers on Monday 07:00 UTC schedule
  # AND on workflow_dispatch for manual reruns.
  uc3-4combo-matrix:
    name: UC3 4-combo matrix (weekly)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 1' || github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aiflow_test
          POSTGRES_USER: aiflow
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aiflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev,vectorstore]"

      - name: Run migrations
        run: .venv/bin/alembic upgrade head
        env:
          AIFLOW_DATABASE__URL: postgresql+asyncpg://aiflow:test@localhost:5432/aiflow_test

      - name: Skip if OPENAI_API_KEY missing (fork-safe)
        id: openai-gate
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "result=skip" >> "$GITHUB_OUTPUT"
            echo "::notice::OPENAI_API_KEY not set — UC3 4-combo matrix skipped."
          else
            echo "result=run" >> "$GITHUB_OUTPUT"
          fi

      - name: Run UC3 4-combo matrix
        if: steps.openai-gate.outputs.result == 'run'
        run: |
          PYTHONPATH=src .venv/bin/python scripts/measure_uc3_llm_context.py
        env:
          AIFLOW_DATABASE__URL: postgresql+asyncpg://aiflow:test@localhost:5432/aiflow_test
          AIFLOW_REDIS__URL: redis://localhost:6379/1
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AIFLOW_LANGFUSE__ENABLED: "false"

      - name: Upload UC3 4-combo report
        if: steps.openai-gate.outputs.result == 'run' && always()
        uses: actions/upload-artifact@v4
        with:
          name: uc3-4combo-matrix-report
          path: docs/uc3_llm_context_baseline.md
          retention-days: 90

      - name: Append summary
        if: always()
        run: |
          if [ -f docs/uc3_llm_context_baseline.md ]; then
            echo "## UC3 4-combo matrix" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            head -40 docs/uc3_llm_context_baseline.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## UC3 4-combo matrix — skipped (no OPENAI_API_KEY)" >> "$GITHUB_STEP_SUMMARY"
          fi

  # Sprint V SV-5 — Weekly DocRecognizer per-doctype accuracy matrix.
  # Hermetic (no LLM, no DB) — runs the rule-engine classifier across
  # all doctypes + all fixtures. Mon 08:00 UTC + workflow_dispatch.
  doc-recognizer-weekly-matrix:
    name: DocRecognizer per-doctype matrix (weekly)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * 1' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev,vectorstore]"

      - name: Run full per-doctype matrix
        run: |
          PYTHONPATH=src .venv/bin/python scripts/measure_doc_recognizer_accuracy.py \
            --output json \
            --output-path doc_recognizer_weekly.json

      - name: Run JSONL per-fixture (operator drilldown)
        run: |
          PYTHONPATH=src .venv/bin/python scripts/measure_doc_recognizer_accuracy.py \
            --output jsonl \
            --output-path doc_recognizer_weekly.jsonl

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doc-recognizer-weekly-matrix
          path: |
            doc_recognizer_weekly.json
            doc_recognizer_weekly.jsonl
          retention-days: 90

      - name: Append summary
        if: always()
        run: |
          if [ -f doc_recognizer_weekly.json ]; then
            echo "## DocRecognizer Weekly Matrix" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat doc_recognizer_weekly.json | head -60 >> "$GITHUB_STEP_SUMMARY"
          fi

  summary:
    name: Regression Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, admin-build]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts/
          merge-multiple: true

      - name: Generate summary
        run: |
          echo "## Nightly L3 Regression Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for suite in unit integration e2e; do
            if [ -f "test-artifacts/test-results-${suite}.xml" ]; then
              failures=$(python3 -c "
          import xml.etree.ElementTree as ET
          t = ET.parse('test-artifacts/test-results-${suite}.xml')
          r = t.getroot()
          f = int(r.attrib.get('failures', 0)) + int(r.attrib.get('errors', 0))
          total = int(r.attrib.get('tests', 0))
          passed = total - f
          print(f'{'PASS' if f == 0 else 'FAIL'} ({passed}/{total})')
          " 2>/dev/null || echo "PARSE ERROR")
              echo "| ${suite} | ${failures} |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| ${suite} | SKIPPED |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "| admin-build | ${{ needs.admin-build.result == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
