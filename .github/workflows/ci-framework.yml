name: Framework CI

on:
  pull_request:
    paths: ['src/aiflow/**', 'tests/**', 'pyproject.toml']
  push:
    branches: [main]
    paths: ['src/aiflow/**', 'tests/**', 'pyproject.toml']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv venv && uv pip install -e ".[dev]"
      - run: .venv/bin/ruff check src/aiflow/ tests/
      - run: .venv/bin/ruff format --check src/aiflow/ tests/
      # mypy is gated on the "hardened kernel" only — strict=true enforced here.
      # Expanding coverage is tracked in the follow-up issue opened from F0.2 (#5).
      - run: .venv/bin/mypy src/aiflow/core/ src/aiflow/intake/ src/aiflow/guardrails/ src/aiflow/policy/ --ignore-missing-imports

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv venv && uv pip install -e ".[dev]"
      - run: .venv/bin/pytest tests/unit/ -v --cov=aiflow --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aiflow_test
          POSTGRES_USER: aiflow
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U aiflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv venv && uv pip install -e ".[dev]"
      - run: .venv/bin/alembic upgrade head
        env:
          AIFLOW_DATABASE__URL: postgresql+asyncpg://aiflow:test@localhost:5432/aiflow_test
      - run: .venv/bin/pytest tests/integration/ -v
        env:
          AIFLOW_DATABASE__URL: postgresql+asyncpg://aiflow:test@localhost:5432/aiflow_test
          AIFLOW_REDIS__URL: redis://localhost:6379/1
