name: AIFlow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint-test:
    name: Python Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: |
          uv run ruff check src/ tests/ skills/
          uv run ruff format --check src/ tests/ skills/

      - name: Unit tests
        run: uv run pytest tests/unit/ -q --tb=short --junitxml=test-results.xml --cov=aiflow --cov-report=xml
        env:
          AIFLOW_DATABASE_URL: "postgresql://localhost/test"

      - name: Coverage gate (80% minimum)
        run: |
          uv run python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib.get('line-rate', 0))
          pct = round(rate * 100, 1)
          print(f'Coverage: {pct}%')
          assert pct >= 80, f'Coverage {pct}% is below 80% gate'
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: |
            test-results.xml
            coverage.xml

  admin-build:
    name: Admin Dashboard Build (Vite + React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aiflow-admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: aiflow-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
