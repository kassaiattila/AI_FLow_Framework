# Promptfoo evaluation config for Email Intent Processor
# Run: npx promptfoo eval -c skills/email_intent_processor/tests/promptfooconfig.yaml
# View: npx promptfoo view
#
# B4.1 update:
#   - Intent catalog expanded from 7 (inline) -> 12 (matching intents.json v1.2)
#   - 4 new tests: invoice_received, calendar_invite, HU tax_number entity,
#     marketing_vs_notification boundary
#   - Total: 16 tests

description: "Email Intent Processor - intent classification & entity extraction (B4.1)"

providers:
  - id: openai:gpt-4o-mini
    label: "gpt-4o-mini (intent classifier)"
    config:
      temperature: 0
      response_format:
        type: json_object

prompts:
  - label: "intent_classifier"
    raw: |
      You are an email intent classifier for a Hungarian insurance company's
      customer service system. Classify the email into exactly one intent category.

      Available categories (12):
        - complaint:        Panasz / reklamacio
        - inquiry:          Informacio keres
        - order:            Rendeles / szerzodes
        - support:          Technikai segitseg
        - feedback:         Visszajelzes / koszonet
        - claim:            Karbejelentes
        - cancellation:     Lemondas / felmondas
        - marketing:        Reklam, ajanlat, NINCS penzugyi tranzakcio
        - notification:     Rendszer / auto ertesites, tranzakcio MAR megtortent
        - internal:         Belso kollegak kozti email
        - invoice_received: KAPOTT szamla / dijbekero, pontos osszeg, fizetesi hatarido
        - calendar_invite:  Meeting meghivas, idoponttal, tipikusan .ics csatolmannyal

      Key boundary rules:
      1. marketing vs notification: marketing = ajanlat/reklam, NO transaction.
         notification = transaction HAPPENED (receipt, confirmation).
      2. invoice_received vs notification: if the email demands payment
         (amount + due date + invoice number) -> invoice_received.
         If it merely confirms a past payment -> notification.
      3. calendar_invite vs internal: .ics attachment + time/location -> calendar_invite.
         Plain text request to meet -> internal.

      Rules:
      1. Analyze subject AND body together.
      2. Choose the SINGLE most relevant intent.
      3. Assign confidence (0.0-1.0).
      4. Respond with valid JSON only.

      Output format:
      {"intent_id": "...", "confidence": 0.0, "sub_intent": "...", "reasoning": "..."}

      Classify this email:

      Subject: {{subject}}

      Body:
      {{body}}

tests:
  # --- Complaint intents ---
  - description: "complaint: rossz kiszolgalas"
    vars:
      subject: "Felháborító kiszolgálás a fióknál"
      body: "Tisztelt Ügyfélszolgálat! Tegnap a Váci úti fiókban 2 órát kellett várnom, senki nem foglalkozott velem. Ez elfogadhatatlan! Kérem visszajelzésüket. Kovács Péter, szerződésszám: AH-2024-001234"
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'complaint'"
      - type: javascript
        value: "JSON.parse(output).confidence >= 0.8"

  - description: "complaint: karterites elutasitva"
    vars:
      subject: "Kártérítés elutasítva - panasz"
      body: "Panaszt nyújtok be a 2024/03/15-i kárbejelentésem (KBJ-2024-5678) elutasítása miatt. A káresemény egyértelműen a biztosítás hatálya alá tartozik. Felülvizsgálatot kérek."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'complaint'"

  # --- Inquiry intents ---
  - description: "inquiry: CASCO dij kerdes"
    vars:
      subject: "Tájékoztatás kérés - CASCO díj"
      body: "Szeretném megtudni, hogy a CASCO biztosításom díja mennyivel emelkedik jövőre. Kötvényszámom: CAS-2023-9876. Előre is köszönöm a választ."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'inquiry'"

  - description: "inquiry: lakasbiztositas villamkar"
    vars:
      subject: "Biztosítási feltételek"
      body: "Érdeklődnék, hogy a lakásbiztosításom kiterjed-e a villámkárra? Ha nem, milyen kiegészítő lehetőségek vannak?"
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'inquiry'"

  # --- Claim intents ---
  - description: "claim: autobaleset"
    vars:
      subject: "Kárbejelentés - autóbaleset"
      body: "Bejelentem, hogy 2024.03.20-án a Budapest, Kossuth Lajos utcában közlekedési balesetben megsérült a gépjárművem (ABC-123). A rendőrségi jegyzőkönyv száma: BPR-2024-4567. Kérem a kárrendezés megindítását."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'claim'"
      - type: javascript
        value: "JSON.parse(output).confidence >= 0.8"

  - description: "claim: viharkar"
    vars:
      subject: "Viharkár bejelentés"
      body: "A tegnapi vihar letépte a tetőcserepeket. Kérem, küldjék ki a kárszakértőt. Cím: 1234 Budapest, Példa u. 5. Kötvényszám: LAK-2023-1111."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'claim'"

  # --- Cancellation intents ---
  - description: "cancellation: CASCO felmondas"
    vars:
      subject: "Szerződés felmondás"
      body: "Ezennel felmondásra kerül a CAS-2023-9876 számú CASCO biztosítási szerződésem 2024.06.30-i hatállyal. Kérem az írásban történő visszaigazolást."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'cancellation'"
      - type: javascript
        value: "JSON.parse(output).confidence >= 0.8"

  # --- Support intents ---
  - description: "support: online fiok hiba"
    vars:
      subject: "Nem tudok belépni az online fiókba"
      body: "Próbálok belépni az ügyfélportálra, de mindig hibát dob. Felhasználónevem: kovacs.peter@email.hu. Tudnának segíteni?"
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'support'"

  # --- Feedback intents ---
  - description: "feedback: koszonet"
    vars:
      subject: "Köszönet a gyors kárrendezésért"
      body: "Szeretném megköszönni a KBJ-2024-1234 számú kárigényem gyors és szakszerű kezelését. Az ügyintéző, Nagy Anna, rendkívül segítőkész volt."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'feedback'"

  # --- Order intents ---
  - description: "order: uj lakasbiztositas"
    vars:
      subject: "Új biztosítás kötése"
      body: "Szeretnék lakásbiztosítást kötni a 1234 Budapest, Példa u. 5. szám alatti ingatlanomra. Kérem, küldjék el az ajánlatot és a szükséges dokumentumokat."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'order'"

  # --- English email ---
  - description: "claim EN: water damage"
    vars:
      subject: "Insurance claim - water damage"
      body: "I would like to report water damage in my apartment at Andrassy ut 10. The flooding occurred on March 18, 2024 due to a burst pipe. Policy number: LAK-2023-2222."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'claim'"

  # --- Ambiguous / multi-intent ---
  - description: "ambiguous: cim modositas + reklamacio"
    vars:
      subject: "Szerződésmódosítás és díjreklamáció"
      body: "Egyrészt módosítani szeretném a címemet (új cím: 5678 Szeged, Tisza u. 10), másrészt reklamálok a márciusi dupla díjlevonás miatt. Számlaszám: HU12-3456-7890."
    assert:
      - type: is-json
      - type: javascript
        value: "['complaint', 'support'].includes(JSON.parse(output).intent_id)"
      - type: javascript
        value: "JSON.parse(output).confidence <= 0.9"

  # ============================================================================
  # B4.1 NEW TESTS (4 new)
  # ============================================================================

  # --- invoice_received (NEW intent) ---
  - description: "B4.1 invoice_received: kapott dijbekero"
    vars:
      subject: "Számla: INV-2026-0042 — fizetési határidő 2026-04-20"
      body: "Tisztelt Ügyfelünk! Ezúton küldjük a 2026. márciusi időszakra vonatkozó számlánkat. Fizetendő összeg: 48 500 Ft. Számlaszám: INV-2026-0042. Fizetési határidő: 2026.04.20. Kedvezményezett: BestIx Kft. Bankszámla: 11773016-01234567. Köszönjük!"
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'invoice_received'"
      - type: javascript
        value: "JSON.parse(output).confidence >= 0.8"

  # --- calendar_invite (NEW intent) ---
  - description: "B4.1 calendar_invite: meeting meghivas"
    vars:
      subject: "Meeting invitation: Sprint review — 2026-04-10 10:00 CET"
      body: "Hi team, you are invited to the Sprint review on Friday April 10, 10:00-11:00 CET. Location: Microsoft Teams (link below). Please RSVP. Organizer: Anna Kovacs. Attachment: invite.ics"
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'calendar_invite'"

  # --- HU tax_number entity detection (marketing vs notification boundary) ---
  - description: "B4.1 marketing_vs_notification: receipt past tx -> notification"
    vars:
      subject: "Your receipt from Netflix"
      body: "Thank you for your payment of €9.99 on April 7, 2026. Your subscription is active until May 7, 2026. Transaction ID: TXN-998877. No further action required."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'notification'"

  # --- marketing pure offer (no transaction) ---
  - description: "B4.1 marketing: pure offer no tx"
    vars:
      subject: "50% off on all home insurance this week!"
      body: "Special promotion for new customers! Get 50% off on our Home Insurance bundle. Offer valid until April 14. Click here to learn more. Unsubscribe at the bottom of this email."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).intent_id === 'marketing'"

outputPath: test_output/promptfoo/email_intent_results.json
