# Promptfoo evaluation config for QBPP Test Automation
# Run: npx promptfoo eval -c skills/qbpp_test_automation/tests/promptfooconfig.yaml
# View: npx promptfoo view
#
# Note: This skill is a STUB — no real workflow exists yet.
# These tests validate the LLM's ability to generate Robot Framework test scripts
# from natural language test scenarios (for future implementation).

description: "QBPP Test Automation - test scenario to Robot Framework script generation"

providers:
  - id: openai:gpt-4o-mini
    label: "gpt-4o-mini (RF script generator)"
    config:
      temperature: 0

prompts:
  - label: "rf_test_generator"
    raw: |
      You are a Robot Framework test script generator for insurance calculator (QBPP) testing.

      Generate a Robot Framework test case from the following scenario.
      Use SeleniumLibrary keywords (Open Browser, Input Text, Click Button, etc.).
      Include proper [Setup] and [Teardown].
      Use descriptive test case names.
      Output ONLY the Robot Framework script, no markdown fences.

      Test scenario:
      {{scenario}}

      Calculator URL: {{calculator_url}}

tests:
  # --- Basic premium calculation ---
  - vars:
      scenario: "Navigate to the QBPP calculator. Enter birth date 1990-05-15, select 'Male' gender, enter postal code 1234. Select vehicle type 'Sedan', engine capacity 1600cc, year 2020. Click Calculate. Verify that the premium amount is displayed and is greater than zero."
      calculator_url: "https://qbpp.example.com/calculator"
    assert:
      - type: contains
        value: "*** Test Cases ***"
      - type: contains-any
        value: ["Open Browser", "Open browser"]
      - type: contains-any
        value: ["Input Text", "Input text"]
      - type: contains-any
        value: ["Click Button", "Click Element", "Click button"]
      - type: contains-any
        value: ["Should Be True", "Should Not Be Empty", "Should Contain", "Element Should Be Visible"]

  # --- Multiple coverage options ---
  - vars:
      scenario: "Open the calculator. Fill in: age 35, female, Budapest (1011). Vehicle: SUV, 2000cc, 2022. Select coverage options: liability only, then full coverage (CASCO). Compare the two premium amounts — CASCO should be higher."
      calculator_url: "https://qbpp.example.com/calculator"
    assert:
      - type: contains
        value: "*** Test Cases ***"
      - type: contains-any
        value: ["CASCO", "casco", "full coverage"]
      - type: llm-rubric
        value: "The test should include at least two calculation runs (liability and full coverage) and compare the results"

  # --- Validation error test ---
  - vars:
      scenario: "Open the calculator. Leave all fields empty and click Calculate. Verify that validation error messages appear for required fields: birth date, gender, postal code, vehicle type."
      calculator_url: "https://qbpp.example.com/calculator"
    assert:
      - type: contains
        value: "*** Test Cases ***"
      - type: contains-any
        value: ["Error", "error", "validation", "Validation", "hiba"]
      - type: llm-rubric
        value: "The test should verify that error messages or validation warnings appear when required fields are left empty"

  # --- Data-driven test ---
  - vars:
      scenario: "Create a data-driven test with 3 test cases using a test data table: Case 1: age 25 male sedan 1400cc → verify premium range 50000-80000 Ft. Case 2: age 45 female SUV 2500cc → verify premium range 80000-120000 Ft. Case 3: age 60 male van 1900cc → verify premium range 60000-100000 Ft."
      calculator_url: "https://qbpp.example.com/calculator"
    assert:
      - type: contains
        value: "*** Test Cases ***"
      - type: llm-rubric
        value: "Should contain at least 3 distinct test cases or a template with test data for 3 different input combinations"

  # --- Discount verification ---
  - vars:
      scenario: "Open the calculator. Enter: age 40, male, 2000 Budapest. Vehicle: sedan, 1600cc, 2023. First calculate without discount. Then apply loyalty discount (5+ years customer). Verify the discounted premium is lower than the original."
      calculator_url: "https://qbpp.example.com/calculator"
    assert:
      - type: contains
        value: "*** Test Cases ***"
      - type: contains-any
        value: ["discount", "Discount", "kedvezmeny", "kedvezmény"]

  # --- Screenshot on failure ---
  - vars:
      scenario: "Open the calculator. Enter invalid postal code 'ABC'. Click calculate. Take a screenshot if an error occurs. Verify the error message mentions invalid postal code format."
      calculator_url: "https://qbpp.example.com/calculator"
    assert:
      - type: contains
        value: "*** Test Cases ***"
      - type: contains-any
        value: ["Capture Page Screenshot", "Screenshot", "screenshot", "Capture"]
      - type: contains-any
        value: ["Teardown", "teardown", "[Teardown]"]

outputPath: test_output/promptfoo/qbpp_results.json
