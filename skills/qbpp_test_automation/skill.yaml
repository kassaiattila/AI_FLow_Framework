name: qbpp_test_automation
display_name: "QBPP Test Automation"
version: "1.0.0"
skill_type: rpa
description: "Playwright registry-driven test automation for insurance calculator (QBPP)"
author: "BestIxCom Kft"
framework_requires: ">=0.1.0"
capabilities: [web_navigation, form_filling, data_validation, screenshot_capture, test_reporting]
workflows: [qbpp-test-automation]
agent_types: [NavigatorAgent, FormFillerAgent, ValidatorAgent, ReporterAgent]
rpa_config:
  browser: chromium
  headless: true
  viewport: {width: 1920, height: 1080}
  timeout_ms: 30000
  retry_on_failure: true
  max_retries: 3
  screenshot_on_failure: true
registry:
  type: data-driven
  source: test_cases.yaml
  fields: [test_id, input_data, expected_output, validation_rules]
tools:
  - playwright
dependencies:
  - playwright>=1.40.0
estimated_cost_per_run: 0.00
tags: [rpa, playwright, insurance, qbpp, test-automation, registry-driven]
