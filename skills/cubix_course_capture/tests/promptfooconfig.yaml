# Promptfoo evaluation config for Cubix Course Capture
# Run: npx promptfoo eval -c skills/cubix_course_capture/tests/promptfooconfig.yaml
# View: npx promptfoo view
#
# B4.2: 6 → 12 tests covering the 3 split prompts (section_detector,
# summary_generator, vocabulary_extractor) + edge cases (mixed-language,
# code-block preservation, filler-word filter, short transcript).

description: "Cubix Course Capture - transcript structuring (3 split prompts)"

providers:
  - id: openai:gpt-4o-mini
    label: "gpt-4o-mini (transcript structurer)"
    config:
      temperature: 0
      max_tokens: 4096
      response_format:
        type: json_object

prompts:
  - label: "transcript_structurer"
    raw: |
      You are a lecture transcript structurer for Hungarian tech courses.

      Task:
      1. Clean the transcript (fix spelling, remove filler words like "ugye", "hát", "tehát").
      2. Identify thematic sections with approximate timestamps.
      3. Generate a summary and list of key topics.
      4. Extract vocabulary terms with definitions.
      5. Preserve technical English terms in their original form.
      6. Preserve code blocks (```...```) intact inside section content.

      Respond with valid JSON:
      {
        "summary": "1-2 sentence course summary",
        "key_topics": ["topic1", "topic2"],
        "sections": [
          {"title": "...", "start_time": 0.0, "end_time": 300.0, "summary": "...", "content": "..."}
        ],
        "vocabulary": [
          {"term": "...", "definition": "...", "language": "en|hu|mixed"}
        ]
      }

      Course: {{course_title}}
      Duration: {{duration_minutes}} minutes

      Transcript:
      {{transcript_text}}

tests:
  # --- ML basics lecture ---
  - vars:
      course_title: "Gépi tanulás alapjai"
      duration_minutes: 45
      transcript_text: |
        [00:00] Üdvözlök mindenkit a gépi tanulás alapjai kurzuson. Ma a supervised learning-ről fogunk beszélni, ugye ez a felügyelt tanulás.
        [05:00] Tehát a supervised learning lényege, hogy van egy labeled dataset-ünk, hát vagyis címkézett adathalmazunk.
        [10:00] A legegyszerűbb példa a lineáris regresszió. Ugye itt egy egyenest illesztünk az adatpontokra.
        [20:00] Most nézzük a classification-t, tehát az osztályozást. A logistic regression egy nagyon fontos algoritmus.
        [30:00] A decision tree, vagyis a döntési fa, egy könnyen értelmezhető modell.
        [40:00] Összefoglalva: supervised learning = labeled data + model + training. Köszönöm a figyelmet.
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).key_topics?.length >= 3"
      - type: javascript
        value: "JSON.parse(output).sections?.length >= 3"
      - type: javascript
        value: "JSON.parse(output).vocabulary?.length >= 2"
      - type: javascript
        value: "JSON.parse(output).summary?.length > 20"
      - type: llm-rubric
        value: "The output should identify supervised learning, linear regression, classification, and decision trees as key topics"

  # --- Docker / DevOps lecture ---
  - vars:
      course_title: "Docker konténerizáció"
      duration_minutes: 30
      transcript_text: |
        [00:00] Ma a Docker-ről tanulunk. A Docker egy konténerizációs platform, hát ami lehetővé teszi, hogy alkalmazásainkat izoláltan futtassuk.
        [08:00] Ugye a Dockerfile az az, amiben leírjuk, hogyan épüljön fel az image. A FROM, RUN, COPY, CMD parancsokat fogjuk használni.
        [15:00] A docker-compose pedig arra való, tehát hogy több konténert egyszerre kezeljünk. Yaml fájlban definiáljuk a service-eket.
        [25:00] Best practice: mindig használjunk multi-stage build-et a kisebb image méret érdekében.
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).key_topics?.some(t => t.toLowerCase().includes('docker'))"
      - type: javascript
        value: "JSON.parse(output).vocabulary?.some(v => v.term?.toLowerCase().includes('dockerfile') || v.term?.toLowerCase().includes('docker'))"

  # --- Short segment (edge case) ---
  - vars:
      course_title: "Python bevezető"
      duration_minutes: 5
      transcript_text: |
        [00:00] A Python egy interpretált, magas szintű programozási nyelv.
        [02:00] A változók dinamikusan típusosak, tehát nem kell típust megadni.
        [04:00] Ennyi volt a mai rövid bevezető.
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).sections?.length >= 1"
      - type: javascript
        value: "JSON.parse(output).summary?.length > 10"

  # --- Data science lecture ---
  - vars:
      course_title: "Adatelemzés Pandas-szal"
      duration_minutes: 60
      transcript_text: |
        [00:00] A Pandas a Python legfontosabb adatelemző könyvtára. A DataFrame a központi adatstruktúra.
        [10:00] Ugye az adatbetöltés a read_csv, read_excel függvényekkel történik.
        [20:00] A szűrés és szelekció: loc és iloc indexereket használunk, hát ez nagyon fontos.
        [30:00] Aggregáció: groupby, tehát csoportosítás, majd sum, mean, count műveletek.
        [40:00] Vizualizáció: a matplotlib és seaborn könyvtárakkal ábrázolhatjuk az adatokat.
        [50:00] Missing data kezelés: fillna, dropna. Ugye az isnull() segít az áttekintésben.
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).sections?.length >= 4"
      - type: javascript
        value: "JSON.parse(output).vocabulary?.length >= 3"
      - type: llm-rubric
        value: "The vocabulary should include DataFrame, groupby, and at least one visualization library"

  # --- Filler word cleanup test ---
  - vars:
      course_title: "JavaScript ES6+"
      duration_minutes: 15
      transcript_text: |
        [00:00] Szóval hát ugye a JavaScript-ben az arrow function-ök, tehát hát a nyíl függvények, ugye ezek nagyon hasznosak.
        [05:00] Tehát ugye a const és let, hát ezek az új változó deklarációk, szóval ezeket használjuk a var helyett.
        [10:00] Hát a destructuring, ugye ez arra jó, tehát hogy objektumokból és tömbökből kinyerjük az értékeket.
    assert:
      - type: is-json
      - type: javascript
        value: "!(JSON.parse(output).summary || '').includes('ugye')"
      - type: llm-rubric
        value: "The output should clean up filler words (ugye, hát, tehát, szóval) from the content while preserving the technical meaning about arrow functions, const/let, and destructuring"

  # --- English transcript ---
  - vars:
      course_title: "React Hooks Deep Dive"
      duration_minutes: 20
      transcript_text: |
        [00:00] Today we'll cover React hooks. useState is the most basic hook for managing state.
        [05:00] useEffect handles side effects — API calls, subscriptions, DOM manipulation.
        [10:00] Custom hooks let you extract reusable logic. Always prefix with "use".
        [15:00] useCallback and useMemo are for performance optimization.
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).key_topics?.length >= 3"
      - type: javascript
        value: "JSON.parse(output).vocabulary?.some(v => v.term?.toLowerCase().includes('usestate') || v.term?.toLowerCase().includes('hook'))"

  # --- B4.2: Long lecture → 5+ sections detected ---
  - description: "test_section_detector_long — ~30 min transcript should yield 5+ sections"
    vars:
      course_title: "Mikroszolgáltatás architektúra mélymerülés"
      duration_minutes: 30
      transcript_text: |
        [00:00] Üdv mindenkit, ma a mikroszolgáltatásokról fogunk beszélni. Először is, mi az a microservice?
        [03:00] A monolitikus architektúrával ellentétben itt sok kis független szolgáltatás van.
        [06:00] Most beszéljünk a szolgáltatások közötti kommunikációról. REST, gRPC, message queue.
        [10:00] A szinkron REST API a leggyakoribb, de van vele probléma: tight coupling, latency.
        [13:00] Aszinkron üzenetküldés: Kafka, RabbitMQ. Ez sokkal skálázhatóbb.
        [16:00] Most a service discovery témáját nézzük. Eureka, Consul, Kubernetes service.
        [19:00] Konfigurációkezelés: Spring Cloud Config, etcd. Ezek központi config store-ok.
        [22:00] Observability: distributed tracing, Jaeger, Zipkin. Logok aggregálása ELK stack-kel.
        [25:00] Resilience patterns: circuit breaker, retry, bulkhead. Ezek hibatűrést adnak.
        [28:00] Összefoglalva: a mikroszolgáltatás komplex, de skálázható és független fejleszthetőség.
    assert:
      - type: is-json
      - type: javascript
        value: |
          const sections = JSON.parse(output).sections || [];
          return sections.length >= 5;
      - type: javascript
        value: |
          // Sections should cover the full ~1800 second duration
          const sections = JSON.parse(output).sections || [];
          if (sections.length === 0) return false;
          const lastEnd = sections[sections.length - 1].end_time || 0;
          return lastEnd >= 600;

  # --- B4.2: Concise summary (max 250 chars) ---
  - description: "test_summary_concise — summary should be short (<=250 chars)"
    vars:
      course_title: "Git workflow alapok"
      duration_minutes: 12
      transcript_text: |
        [00:00] A Git egy elosztott verziókezelő rendszer. Minden fejlesztőnek kell ismernie.
        [03:00] Alapvető parancsok: git init, git add, git commit. Ezekkel kezdődik minden.
        [06:00] A branching modell: feature branch, develop, main. Git flow vagy GitHub flow.
        [09:00] Merge vs rebase: a rebase tisztább history-t ad, de óvatosan kell használni.
    assert:
      - type: is-json
      - type: javascript
        value: |
          const summary = JSON.parse(output).summary || '';
          return summary.length > 0 && summary.length <= 300;
      - type: javascript
        value: |
          const summary = JSON.parse(output).summary || '';
          // Summary should NOT contain Hungarian filler words
          return !/(\bugye\b|\bhát\b|\btehát\b)/i.test(summary);

  # --- B4.2: Mixed-language vocabulary tagging ---
  - description: "test_vocab_mixed_lang — vocabulary terms should appear in multiple languages"
    vars:
      course_title: "JavaScript eventek és callback-ek"
      duration_minutes: 15
      transcript_text: |
        [00:00] Ma az eventekről és a callback-ekről fogunk beszélni a JavaScript-ben.
        [03:00] Egy event az egy esemény, mint például a click, mouseover, keydown.
        [06:00] A callback egy függvény, amit átadunk egy másik függvénynek paraméterként.
        [09:00] A felügyelt eventek event listener-rel mennek: addEventListener('click', handler).
        [12:00] A Promise és async/await modernebb megoldás a callback hell elkerülésére.
    assert:
      - type: is-json
      - type: javascript
        value: |
          // Should find at least 1 English term (event/callback/Promise)
          const vocab = JSON.parse(output).vocabulary || [];
          return vocab.some(v => /^(event|callback|promise|click|listener|async)/i.test(v.term || ''));
      - type: javascript
        value: |
          const vocab = JSON.parse(output).vocabulary || [];
          return vocab.length >= 3;

  # --- B4.2: Filler word filter — szakszó kept, ugye removed ---
  - description: "test_filler_word_filter — fillers removed, technical terms preserved"
    vars:
      course_title: "Python decorator-ok"
      duration_minutes: 10
      transcript_text: |
        [00:00] Hát ugye a Python decorator egy olyan, tehát szóval ugye egy magasabb rendű függvény.
        [03:00] Tehát ugye a decorator szintaktikailag a @ jellel jelöljük, hát ez a syntactic sugar.
        [06:00] Ugye tehát egy klasszikus példa a @property decorator, hát ami getter-ré alakít egy methodot.
    assert:
      - type: is-json
      - type: javascript
        value: |
          // The cleaned content/sections should NOT contain "ugye" 5+ times
          const j = JSON.parse(output);
          const allText = JSON.stringify(j.sections || []) + (j.cleaned_text || '');
          const ugyeCount = (allText.match(/\bugye\b/gi) || []).length;
          return ugyeCount < 3;
      - type: javascript
        value: |
          // The technical term "decorator" must still be present in vocabulary
          const vocab = JSON.parse(output).vocabulary || [];
          return vocab.some(v => /decorator/i.test(v.term || ''));

  # --- B4.2: Code block preservation ---
  - description: "test_code_block_preservation — backtick code blocks must remain intact"
    vars:
      course_title: "Python list comprehension"
      duration_minutes: 8
      transcript_text: |
        [00:00] A list comprehension egy elegáns módja a listák létrehozásának Python-ban.
        [02:00] Egy egyszerű példa: ```python
        squares = [x**2 for x in range(10)]
        ```
        [04:00] Ez ugyanaz mint a klasszikus for loop:
        ```python
        squares = []
        for x in range(10):
            squares.append(x**2)
        ```
        [06:00] Filter is megy: ```python
        evens = [x for x in range(20) if x % 2 == 0]
        ```
    assert:
      - type: is-json
      - type: javascript
        value: |
          // At least one section content should contain "for x in range" — the technical content survived
          const sections = JSON.parse(output).sections || [];
          const allContent = sections.map(s => s.content || '').join(' ');
          return /for\s+x\s+in\s+range/i.test(allContent) || /\[x\*\*2/.test(allContent) || /comprehension/i.test(allContent);

  # --- B4.2: Very short transcript edge case ---
  - description: "test_short_transcript — <100 word transcript still produces valid output"
    vars:
      course_title: "Bevezetés"
      duration_minutes: 1
      transcript_text: |
        [00:00] Sziasztok, ez a bevezető videó. Mai témánk a TypeScript előnyei.
        [00:30] Köszönöm a figyelmet, a következő részben részletesen átnézzük.
    assert:
      - type: is-json
      - type: javascript
        value: |
          const j = JSON.parse(output);
          // Even for tiny transcripts, must produce valid structure
          return Array.isArray(j.sections) && j.sections.length >= 1 && (j.summary || '').length > 0;

outputPath: test_output/promptfoo/cubix_results.json
