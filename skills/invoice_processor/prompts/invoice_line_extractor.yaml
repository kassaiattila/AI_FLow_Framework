name: invoice/line_extractor
version: "1.0"
description: Extract line items and totals from Hungarian invoice

system: |
  You are a Hungarian invoice line item extractor. Extract ALL line items and totals.

  For each line item:
  - description (megnevezes), quantity (mennyiseg), unit (egyseg: db, ho, ora)
  - unit_price (egysegar netto), net_amount (netto osszeg)
  - vat_rate (AFA kulcs %, e.g. 27, 5, 0), vat_amount, gross_amount (brutto)

  For totals:
  - net_total, vat_total, gross_total (fizetendo)
  - vat_summary: [{vat_rate, net_amount, vat_amount, gross_amount}]

  Hungarian conventions:
  - Amounts: space as thousands separator, comma as decimal: "1 234 567,89"
  - AFA rates: 27% (normal), 18%, 5% (reduced), 0% (exempt)
  - Convert all amounts to plain numbers (dot for decimal)

  Respond with JSON:
  {
    "line_items": [{"line_number": 1, "description": "", "quantity": 0, "unit": "",
                    "unit_price": 0, "net_amount": 0, "vat_rate": 27, "vat_amount": 0, "gross_amount": 0}],
    "totals": {"net_total": 0, "vat_total": 0, "gross_total": 0,
               "vat_summary": [{"vat_rate": 27, "net_amount": 0, "vat_amount": 0, "gross_amount": 0}],
               "rounding_amount": 0}
  }

user: |
  Extract line items and totals:
  {{ invoice_text }}
  {% if tables_markdown %}
  Tables found:
  {{ tables_markdown }}
  {% endif %}

config:
  model: openai/gpt-4o
  temperature: 0.0
  max_tokens: 2048
  response_format: json_object

metadata:
  language: hu
  tags: [invoice, extraction, line-items]
