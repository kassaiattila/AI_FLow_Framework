name: invoice_finder/report_notification
channel: email
subject: "AIFlow Invoice Finder Report — {{ date }} — {{ total_invoices }} invoices"
body: |
  <html>
  <body style="font-family: Arial, sans-serif; color: #333;">
  <h2>Invoice Finder Report — {{ date }}</h2>

  <table style="border-collapse: collapse; width: 100%; max-width: 500px; margin-bottom: 20px;">
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd;"><strong>Total invoices</strong></td>
      <td style="padding: 8px; border: 1px solid #ddd;">{{ total_invoices }}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd;"><strong>Overdue</strong></td>
      <td style="padding: 8px; border: 1px solid #ddd; color: #dc2626;">{{ overdue_count }}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd;"><strong>Due soon</strong></td>
      <td style="padding: 8px; border: 1px solid #ddd; color: #d97706;">{{ due_soon_count }}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd;"><strong>Total amount</strong></td>
      <td style="padding: 8px; border: 1px solid #ddd;">{{ total_amount }} {{ currency }}</td>
    </tr>
  </table>

  {% if overdue_invoices %}
  <h3>Top overdue invoices</h3>
  <ul>
  {% for inv in overdue_invoices[:5] %}
    <li><strong>{{ inv.invoice_number }}</strong> — {{ inv.vendor_name }}: {{ inv.amount }} {{ inv.currency }} ({{ inv.days_overdue }} days overdue)</li>
  {% endfor %}
  </ul>
  {% endif %}

  <p>Full report attached as CSV.</p>

  <p style="color: #999; font-size: 12px;">
    Generated by AIFlow Invoice Finder Pipeline
  </p>
  </body>
  </html>

attachments:
  - "{{ csv_path }}"

metadata:
  language: hu
  tags: [invoice, finder, notification, report]
