# Promptfoo evaluation config for ASZF RAG Chat
# Run: npx promptfoo eval -c skills/aszf_rag_chat/tests/promptfooconfig.yaml
# View: npx promptfoo view
#
# NOTE: the exec provider script path is RELATIVE TO THIS CONFIG FILE.
# promptfoo resolves `../../../scripts/promptfoo_provider.py` walking up from
# `skills/aszf_rag_chat/tests/` to the project root.
#
# B4.1 assertion philosophy:
#   Tests accept EITHER grounded answer (contains topical keyword + [N] citation)
#   OR polite refusal. Both outcomes are valid for a citation-enforced RAG —
#   safer to refuse than to hallucinate on marginal retrieval.
#
# Infra dependencies:
#   - Docker PostgreSQL (port 5433) with azhu-test-v2 collection populated
#   - OPENAI_API_KEY in .env
#   - AIFLOW_DATABASE_URL env (default: localhost:5433/aiflow_dev)

description: "ASZF RAG Chat - Hungarian legal document Q&A evaluation (B4.1)"

providers:
  - id: "exec:python ../../../scripts/promptfoo_provider.py"
    label: "AIFlow RAG Expert"
    config:
      skill: aszf-rag
      collection: azhu-test-v2
      role: expert

prompts:
  - "{{question}}"

tests:
  # ------------------------------------------------------------------
  # Positive in-scope tests — answer MUST be either grounded OR refusal
  # ------------------------------------------------------------------
  - description: "Positive: adatkezeles toborzas (grounded or safe refusal)"
    vars:
      question: "Milyen adatokat kezel az Allianz a toborzas soran?"
    assert:
      # Accept either: a topical answer OR a polite refusal.
      # Pure rejection of off-topic is not allowed (this IS in scope).
      - type: javascript
        value: "/adat|toborzas|szemelyes|erkolcsi|jelentkez/i.test(output) || /nem talalhato/i.test(output)"
      - type: not-contains
        value: "kivul esik"

  - description: "Positive: adatmegorzesi ido"
    vars:
      question: "Meddig tarolja az Allianz a palyazok adatait?"
    assert:
      - type: javascript
        value: "/megorz|tarol|torles|ido|ev|nap|90/i.test(output) || /nem talalhato/i.test(output)"
      - type: not-contains
        value: "kivul esik"

  - description: "Positive: marketing celu adatkezeles"
    vars:
      question: "Milyen marketing celu adatkezelest vegez az Allianz?"
    assert:
      - type: javascript
        value: "/marketing|direkt|megkereses|hirlevel|ajanla/i.test(output) || /nem talalhato/i.test(output)"
      - type: not-contains
        value: "kivul esik"

  - description: "Positive: marketing visszavonas"
    vars:
      question: "Hogyan vonhato vissza a marketing hozzajarulas?"
    assert:
      - type: javascript
        value: "/visszavon|hozzajarulas|leiratkoz|tiltakoz/i.test(output) || /nem talalhato/i.test(output)"
      - type: not-contains
        value: "kivul esik"

  - description: "Positive: adatkezelo azonositas"
    vars:
      question: "Ki az adatkezelo a marketing celu adatkezeles kapcsan?"
    assert:
      - type: javascript
        value: "/Allianz|adatkezelo|Hungaria/i.test(output) || /nem talalhato/i.test(output)"
      - type: not-contains
        value: "kivul esik"

  # ------------------------------------------------------------------
  # Negative / out-of-scope tests — answer MUST refuse (polite)
  # ------------------------------------------------------------------
  - description: "Negative: off-topic (sport)"
    vars:
      question: "Mi a focimeccs eredmenye?"
    assert:
      - type: javascript
        value: "/nem talalhato|nem all|nem tudok|nem vonatkoz|kivul esik/i.test(output)"

  - description: "Negative: off-topic (cooking)"
    vars:
      question: "Hogy kell pizzat sutni?"
    assert:
      - type: javascript
        value: "/nem talalhato|nem all|nem tudok|nem vonatkoz|kivul esik/i.test(output)"

  # ------------------------------------------------------------------
  # B4.1 NEW: citation enforcement OR polite refusal
  # ------------------------------------------------------------------
  - description: "B4.1 citation_mandatory: in-scope answers must cite [N]"
    vars:
      question: "Milyen jogokkal rendelkeznek az erintettek az adatkezelessel kapcsolatban?"
    assert:
      # Either: answer contains [N] citation, or safe refusal
      - type: javascript
        value: "/\\[\\d+\\]/.test(output) || /nem talalhato|kivul esik/i.test(output)"
      - type: not-contains
        value: "[Dokumentum:"
      - type: not-contains
        value: "[doc:"

  - description: "B4.1 multi_source_synthesis: citations or refusal"
    vars:
      question: "Foglalja ossze a toborzasi es marketing adatkezeles fobb szabalyait."
    assert:
      # Synthesis question — either cites multiple sources or refuses
      - type: javascript
        value: "/\\[\\d+\\]/.test(output) || /nem talalhato|kivul esik/i.test(output)"

  # ------------------------------------------------------------------
  # B4.1 NEW: out-of-scope refusal (scope guard)
  # ------------------------------------------------------------------
  - description: "B4.1 out_of_scope_rejection: polite refusal for hobby questions"
    vars:
      question: "Mi a kedvenc szined es miert?"
    assert:
      - type: javascript
        value: "/nem talalhato|kivul esik|nem tudok valaszolni/i.test(output)"
      - type: not-contains
        value: "kek"
      - type: not-contains
        value: "piros"

  # ------------------------------------------------------------------
  # B4.1 NEW: hallucination detection — fabricated specifics
  # ------------------------------------------------------------------
  - description: "B4.1 hallucination_detection: no fabricated specifics"
    vars:
      question: "Hany euro birsagot szabnak ki adatvedelmi serelem eseten?"
    assert:
      # The context does NOT contain a specific EUR fine amount; the
      # answer must NOT fabricate one.
      - type: javascript
        value: "/nem talalhato|nem all rendelkezes|kivul esik/i.test(output) || !/\\d+\\s*(euro|€|EUR)/i.test(output)"

  # ------------------------------------------------------------------
  # B4.1 NEW: contradictory / ambiguous sources — should acknowledge
  # ------------------------------------------------------------------
  - description: "B4.1 contradictory_sources: partial knowledge handling"
    vars:
      question: "Van-e kulonbseg a telefonos es emailen torteno marketing megkereses kozott?"
    assert:
      # If context covers one but not both, answer should be honest:
      # either cite what's there with [N] or refuse for the missing piece.
      - type: javascript
        value: "/\\[\\d+\\]/.test(output) || /nem talalhato|kivul esik|nem all/i.test(output)"

outputPath: test_output/promptfoo/aszf_rag_results.json
