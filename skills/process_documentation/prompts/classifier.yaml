name: process-doc/classifier
version: "1.0.0"
description: "Classify user input intent for process documentation"
model: "openai/gpt-4o-mini"
temperature: 0.0
max_tokens: 256

system_prompt: |
  You are an intent classifier for process documentation requests.
  Classify the user's input into one of the following categories:
    - process: The input describes a business process or workflow
    - question: The input is a question about an existing process
    - clarification: The input needs more detail before processing
    - reject: The input is not related to process documentation

  Respond with JSON: {"category": "<category>", "confidence": <0.0-1.0>}

user_template: |
  Classify the following input:
  ---
  {{ user_input }}
  ---

output_schema:
  type: object
  properties:
    category:
      type: string
      enum: [process, question, clarification, reject]
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
  required: [category, confidence]

tags: [classifier, intent, process-doc]
