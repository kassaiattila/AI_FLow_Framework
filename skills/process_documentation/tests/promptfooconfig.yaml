# Promptfoo evaluation config for Process Documentation
# Run: npx promptfoo eval -c skills/process_documentation/tests/promptfooconfig.yaml
# View: npx promptfoo view

description: "Process Documentation - natural language to BPMN/Mermaid diagram"

providers:
  - id: openai:gpt-4o-mini
    label: "gpt-4o-mini (process extractor)"
    config:
      temperature: 0

prompts:
  - label: "process_extractor_and_mermaid"
    raw: |
      You are a business process analyst. Convert the following process description
      into a Mermaid flowchart diagram.

      STRICT SHAPE MAPPING (use exactly these shapes):
      - Start/End events:  id([Label])         stadium / rounded
      - User/Service task: id[Label]           rectangle
      - Decision (gateway): id{Label?}         rhombus (always end with `?`)
      - Parallel branches: A --> B & C         (ampersand fans out)

      EDGE LABELING RULES (mandatory):
      - Every decision `{...}` MUST have AT LEAST 2 outgoing edges, each with a label.
        Hungarian: -->|Igen| / -->|Nem|. English: -->|Yes| / -->|No|.
      - Other branch labels (e.g. -->|Számlázás| / -->|Technikai|) are also valid.
      - A `loop back` edge that returns to a previous step is encouraged when the
        description says "vissza", "ismét", "újra", "back", "again", "retry".

      OFF-TOPIC REFUSAL (very important):
      - If the input is NOT a business process (e.g. greetings "hi", "hello",
        casual chat, a question about how to do something, or weather/news/jokes),
        output exactly: NOT_A_PROCESS
      - Do NOT invent a flowchart for non-process input.

      OUTPUT RULES:
      1. Use "flowchart TD" (top-down) syntax.
      2. Include ALL steps from the description — do not skip any.
      3. Output ONLY the Mermaid code (or `NOT_A_PROCESS`).
         No markdown fences, no explanations, no comments.

      FEW-SHOT EXAMPLE (parallel + decision + loop back):
      Input: "A vevő leadja a rendelést. A raktáros és a könyvelő egyszerre dolgozik:
      a raktáros csomagol, a könyvelő számlázik. Ha a csomag sérült, vissza a raktárba.
      Egyébként kiszállítás."
      Output:
      flowchart TD
          A([Start]) --> B[Vevő leadja a rendelést]
          B --> C[Raktáros csomagol] & D[Könyvelő számlázik]
          C --> E{Csomag sérült?}
          E -->|Igen| C
          E -->|Nem| F[Kiszállítás]
          D --> F
          F --> G([End])

      Process description:
      {{process_description}}

tests:
  # --- Simple linear process ---
  - vars:
      process_description: "A vevő leadja a rendelést, az ügyfélszolgálat rögzíti a rendszerben, a raktáros összeállítja a csomagot, a futár kiszállítja, és a vevő átveszi."
    assert:
      - type: contains
        value: "flowchart"
      - type: contains-any
        value: ["rendel", "rögzít", "csomag", "kiszállít", "átvesz"]
      - type: not-contains
        value: "```"

  # --- Process with decision ---
  - vars:
      process_description: "Az ügyfél benyújtja a kártérítési igényt. A kárszakértő megvizsgálja. Ha a kár fedezett, a biztosító kifizeti. Ha nem fedezett, a biztosító elutasítja és értesíti az ügyfelet."
    assert:
      - type: contains
        value: "flowchart"
      - type: contains-any
        value: ["fedezett", "kifizet", "elutasít", "igen", "nem", "Igen", "Nem", "Yes", "No"]
      - type: javascript
        value: "output.includes('{') || output.includes('diamond') || output.includes('?')"

  # --- Parallel / multi-actor ---
  - vars:
      process_description: "A HR előkészíti az álláshirdetést. A vezető jóváhagyja. Ezt követően a HR közzéteszi az állást. A jelentkezők beadják a pályázatot. A HR szűri a jelentkezőket, majd a vezető interjúztat. Ha alkalmas, ajánlatot tesz. Ha nem, elutasító levelet küld."
    assert:
      - type: contains
        value: "flowchart"
      - type: contains-any
        value: ["HR", "vezető", "jelentkez", "interjú", "ajánlat"]
      - type: llm-rubric
        value: "The diagram should have at least 6 nodes and include a decision point about candidate suitability"

  # --- IT/DevOps process ---
  - vars:
      process_description: "A fejlesztő commitol a Git-be. A CI pipeline lefut. Ha sikeres, a build artifact feltöltődik. A staging deploy automatikusan elindul. A tesztelő elfogadja vagy elutasítja. Ha elfogadta, production deploy indul."
    assert:
      - type: contains
        value: "flowchart"
      - type: contains-any
        value: ["commit", "CI", "pipeline", "staging", "production", "deploy"]

  # --- Simple approval workflow ---
  - vars:
      process_description: "Az alkalmazott beadja a szabadságkérelmet. A közvetlen felettes jóváhagyja vagy elutasítja. Ha jóváhagyta, a HR rögzíti. Ha elutasította, az alkalmazott értesítést kap."
    assert:
      - type: contains
        value: "flowchart"
      - type: contains-any
        value: ["szabadság", "jóváhagy", "elutasít"]

  # --- Invoice / procurement process ---
  - vars:
      process_description: "A beszerzés igénylést kap. Kiválasztja a szállítót. Ajánlatot kér. Ha az ár elfogadható, megrendeli. Ha nem, új szállítót keres. A termék megérkezik, a raktár bevételezi, a pénzügy kifizeti a számlát."
    assert:
      - type: contains
        value: "flowchart"
      - type: contains-any
        value: ["beszerzés", "szállító", "ajánlat", "megrendel", "kifizet"]
      - type: llm-rubric
        value: "The flowchart should contain a decision about price acceptability and at least 7 steps"

  # --- English process ---
  - vars:
      process_description: "Customer submits a support ticket. Level 1 agent triages it. If it's a known issue, the agent resolves it and closes the ticket. If unknown, it's escalated to Level 2. Level 2 investigates and resolves. Customer receives notification."
    assert:
      - type: contains
        value: "flowchart"
      - type: contains-any
        value: ["ticket", "triage", "Level", "escalat", "resolve"]

  # --- Onboarding process ---
  - vars:
      process_description: "Az új munkatárs első napján megkapja a laptopot az IT-től. A HR bemutatja a csapatnak. A mentor kijelölésre kerül. Az első héten részt vesz az orientációs tréningen. A próbaidő végén a vezető értékeli a teljesítményt."
    assert:
      - type: contains
        value: "flowchart"
      - type: contains-any
        value: ["laptop", "IT", "mentor", "tréning", "értékel"]

  # --- Minimal process ---
  - vars:
      process_description: "Bejelentkezés, ügyintézés, kijelentkezés."
    assert:
      - type: contains
        value: "flowchart"
      - type: llm-rubric
        value: "Should produce a simple 3-step linear flowchart"

  # --- Complex multi-branch ---
  - vars:
      process_description: "Az ügyfél hívja a call centert. Az IVR rendszer irányítja: ha számlázás, a pénzügyi csapat kezeli; ha technikai probléma, a support csapat; ha értékesítés, a sales csapat veszi át. Minden esetben a hívás végén elégedettségi felmérés történik."
    assert:
      - type: contains
        value: "flowchart"
      - type: contains-any
        value: ["IVR", "számlázás", "technikai", "értékesítés", "elégedettség"]
      - type: llm-rubric
        value: "Should have at least 3 branches from a central decision/routing point"

  # --- B4.2: Decision label enforcement ---
  - description: "test_decision_labels — every decision diamond must have labeled outgoing edges"
    vars:
      process_description: "Az ügyfél kérelmet ad be. A vezető megvizsgálja. Ha jóváhagyja, a pénzügy kifizeti. Ha elutasítja, az ügyfél értesítést kap."
    assert:
      - type: contains
        value: "flowchart"
      - type: javascript
        value: |
          const hasDecision = /\{[^}]+\}/.test(output);
          const labeledEdges = (output.match(/-->\|[^|]+\|/g) || []).length;
          return hasDecision && labeledEdges >= 2;

  # --- B4.2: Parallel branches with ampersand syntax ---
  - description: "test_parallel_branches — concurrent branches must use parallel syntax"
    vars:
      process_description: "A megrendelés beérkezése után egyszerre indul a csomagolás és a számlázás. Mindkettő befejeztével a csomag postázásra kerül."
    assert:
      - type: contains
        value: "flowchart"
      - type: javascript
        value: |
          // Accept either `B --> C & D` ampersand syntax OR a node with 2+ outgoing edges.
          const hasAmpersand = / & /.test(output);
          const lines = output.split('\n');
          const fromCount = {};
          for (const l of lines) {
            const m = l.match(/^\s*([A-Za-z0-9_]+)\s*-->/);
            if (m) fromCount[m[1]] = (fromCount[m[1]] || 0) + 1;
          }
          const hasFan = Object.values(fromCount).some(v => v >= 2);
          return hasAmpersand || hasFan;

  # --- B4.2: Off-topic refusal — non-process input ---
  - description: "test_off_topic_refusal — greetings/chat must NOT produce a flowchart"
    vars:
      process_description: "Hello, hogy vagy ma? Milyen az időjárás?"
    assert:
      - type: javascript
        value: |
          // Either output is exactly NOT_A_PROCESS, OR it contains no flowchart structure.
          const isRefusal = /NOT_A_PROCESS/i.test(output);
          const hasFlowchart = /flowchart\s+TD[\s\S]*-->/i.test(output);
          return isRefusal || !hasFlowchart;

  # --- B4.2: Loop-back / retry edge ---
  - description: "test_loop_back — retry/back-to-step must produce a loop edge"
    vars:
      process_description: "A fejlesztő commitol. A CI lefut. Ha sikertelen, vissza a kódoláshoz. Ha sikeres, deploy."
    assert:
      - type: contains
        value: "flowchart"
      - type: javascript
        value: |
          // Look for any node that appears as a target of an edge from a LATER node
          // (i.e. an upstream node referenced from downstream → loop back).
          const lines = output.split('\n').map(l => l.trim()).filter(l => l.includes('-->'));
          const order = {};
          let idx = 0;
          for (const l of lines) {
            const m = l.match(/^([A-Za-z0-9_]+)/);
            if (m && !(m[1] in order)) { order[m[1]] = idx++; }
            const m2 = l.match(/-->\s*\|?[^|]*\|?\s*([A-Za-z0-9_]+)/);
            if (m2 && !(m2[1] in order)) { order[m2[1]] = idx++; }
          }
          for (const l of lines) {
            const src = (l.match(/^([A-Za-z0-9_]+)/) || [])[1];
            const tgt = (l.match(/-->\s*\|?[^|]*\|?\s*([A-Za-z0-9_]+)/) || [])[1];
            if (src && tgt && order[tgt] < order[src]) return true;
          }
          return false;

outputPath: test_output/promptfoo/process_doc_results.json
