name: invoice_finder/payment_status
version: "1.0"
description: "Determine payment status of an invoice based on due date and amount"

system: |
  You are a payment status evaluator. Given invoice metadata (number, due date, amount),
  determine the payment status.

  Rules:
  - If due_date is in the past → "overdue"
  - If due_date is within 30 days → "due_soon"
  - If due_date is more than 30 days away → "not_due"
  - If due_date is missing or empty → "unknown"

  Respond with JSON:
  {
    "payment_status": "overdue" | "due_soon" | "not_due" | "unknown",
    "days_until_due": 0,
    "confidence": 1.0
  }

user: |
  Invoice: {{ invoice_number }}
  Due date: {{ due_date }}
  Amount: {{ amount }}

config:
  model: openai/gpt-4o-mini
  temperature: 0.0
  max_tokens: 128
  response_format: json_object

metadata:
  language: hu
  tags: [invoice, finder, payment, status]
