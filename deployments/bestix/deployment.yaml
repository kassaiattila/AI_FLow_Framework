customer:
  name: bestix
  display_name: "BestIxCom Kft"
  contact_email: dev@bestix.hu
  tier: enterprise

framework:
  version: "0.1.0"
  image_variant: base-rpa

skill_templates:
  - name: process_documentation
    version: "0.1.0"
  - name: aszf_rag_chat
    version: "0.1.0"

instances:
  - file: instances/bestix-process-docs.yaml
  - file: instances/bestix-internal-rag.yaml

infrastructure:
  docker_compose_project: aiflow-bestix
  k8s_namespace: null
  database:
    host: localhost
    name: aiflow_bestix
  redis:
    db: 3
    prefix: "bestix:"
  langfuse:
    project: bestix-aiflow
    prompt_label_prefix: "bestix"
  resources:
    api_replicas: 1
    worker_replicas: 1
    rpa_worker_replicas: 1
    memory_limit: "2Gi"
    cpu_limit: "1000m"
