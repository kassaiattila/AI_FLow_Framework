server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html (hash router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy → FastAPI container
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering for streaming endpoints
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # Generous timeouts for long-running pipeline executions
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health endpoint proxy → FastAPI
    location /health {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    # UI health (nginx itself — for Docker healthcheck)
    location /health-ui {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
